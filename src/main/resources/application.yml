spring:
  application:
    name: panini-album
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: ${PORT:8081}
  servlet:
    context-path: /

logging:
  level:
    com.panini.album: DEBUG
    org.springframework.security: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8100,http://localhost:4200,capacitor://localhost,ionic://localhost}
  jwt:
    secret: ${JWT_SECRET:cambiame-en-produccion-este-debe-ser-un-string-largo-y-aleatorio-de-mas-de-64-caracteres-1234567890}
    expiration-ms: 86400000  # 24h
